name: alerix_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  
  # Persistencia
  shared_preferences: ^2.2.2
  
  # Ubicación
  geolocator: ^12.0.0
  
  # URL Launcher (WhatsApp)
  url_launcher: ^6.3.0
  
  # Audio
  audioplayers: ^6.0.0
  
  # Selector de archivos
  file_picker: ^8.0.0
  
  # Permisos
  permission_handler: ^11.0.0
  
  # Directorio de documentos
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/sounds/jacocosound.mp3