workflows:
  default:
    name: iOS Build
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: flutter pub get
        script: flutter pub get
      - name: Build IPA
        script: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r ../../../app.ipa Payload
    artifacts:
      - app.ipa